<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Widget FINAL</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <h2 class="title">Crypto Widget FINAL</h2>

  <!-- Precios -->
  <div id="prices" class="card"></div>

  <!-- Botones -->
  <button onclick="showChart()">Ver Gráfico</button>
  <button onclick="showSignals()">Panel de Señales</button>

  <!-- Contenedor del gráfico -->
  <div id="chartContainer" style="display:none; margin-top:20px;">
    <div id="chart"></div>
  </div>

  <!-- Señales básicas -->
  <div id="signals" class="card" style="display:none;"></div>

  <!-- Panel de configuración -->
  <div class="card" style="margin-top:20px;">
    <h3>Configuración de Señales</h3>
    <label>Criptomoneda:</label>
    <select id="cryptoSelect">
      <option value="bitcoin">BTC</option>
      <option value="ethereum">ETH</option>
      <option value="cardano">ADA</option>
      <option value="pax-gold">PAXG</option>
    </select>
    <label>EMA Rápida:</label>
    <input id="emaFast" type="number" value="20">
    <label>EMA Lenta:</label>
    <input id="emaSlow" type="number" value="50">
    <button onclick="calculateCustomSignal()">Calcular Señal</button>
    <div id="customResult" class="card" style="display:none;"></div>
  </div>

  <!-- App JS -->
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
